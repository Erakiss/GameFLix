name: gameflix
description: "A party game hub"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  font_awesome_flutter: ^11.0.0
  auto_size_text: ^3.0.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4 

flutter_launcher_icons:
  android: "ic_launcher" # ⚠️ Remplace "true" par "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png" # Fallback (pour iOS et les très vieux Android)
  adaptive_icon_background: "assets/icon_background.png" # Ton fond uni
  adaptive_icon_foreground: "assets/icon_foreground.png" # Ton logo détouré
  remove_alpha_ios: true 

flutter:
  uses-material-design: true
  assets:
      - assets/
      - assets/data/
